<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Registro financiero</title>
<base target="_top">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root{
    --ink:#0A0E17; --panel:#111827; --elev:#161F33; --line:#243049;
    --text:#E8ECF6; --muted:#8695B0; --faint:#5A6684;
    --accent:#A78BFA; --accent-soft:rgba(167,139,250,.14);
    --income:#34D399; --expense:#FB7185; --savings:#FBBF24;
    --pen:#A78BFA; --usd:#38BDF8;
    --radius:16px;
    --shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 12px 32px -18px rgba(0,0,0,.8);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(167,139,250,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(56,189,248,.06), transparent 55%),
      var(--ink);
    color:var(--text); font-family:Inter,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; padding-bottom:56px;
  }
  .num{font-family:"Space Grotesk",Inter,sans-serif; font-variant-numeric:tabular-nums; letter-spacing:-.01em}

  header{
    position:sticky; top:0; z-index:20; backdrop-filter:blur(14px);
    background:linear-gradient(180deg,rgba(10,14,23,.92),rgba(10,14,23,.72));
    border-bottom:1px solid var(--line);
  }
  .bar{max-width:1100px; margin:0 auto; padding:14px 22px; display:flex; align-items:center; gap:16px; flex-wrap:wrap}
  .brand{display:flex; align-items:center; gap:12px; margin-right:auto}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .brand h1{font-family:"Space Grotesk"; font-size:19px; font-weight:600; margin:0; letter-spacing:-.02em}
  .links{display:flex; gap:14px; flex-wrap:wrap}
  .links a{font-size:13px; color:var(--muted); text-decoration:none; transition:.15s}
  .links a:hover{color:var(--text)}
  .controls{display:flex; align-items:center; gap:12px; flex-wrap:wrap}

  .seg{display:inline-flex; align-items:center; background:var(--panel); border:1px solid var(--line); border-radius:11px; padding:3px; gap:2px}
  .seg button{
    font-family:"Space Grotesk"; font-weight:600; font-size:14px; color:var(--muted);
    background:transparent; border:0; width:30px; height:30px; border-radius:8px; cursor:pointer; transition:.18s;
  }
  .seg button:hover:not(:disabled){background:var(--accent-soft); color:var(--text)}
  .seg button:disabled{opacity:.35; cursor:default}
  .seg #mes{font-family:"Space Grotesk"; font-weight:600; font-size:13px; color:var(--text); min-width:130px; text-align:center; text-transform:capitalize; padding:0 6px}

  main{max-width:1100px; margin:0 auto; padding:22px}

  .kpis{display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:20px}
  .kpi{background:linear-gradient(180deg,var(--elev),var(--panel)); border:1px solid var(--line); border-radius:var(--radius); padding:15px 16px; box-shadow:var(--shadow); position:relative; overflow:hidden}
  .kpi .lab{font-size:11px; text-transform:uppercase; letter-spacing:.09em; color:var(--muted); margin-bottom:8px}
  .kpi .val{font-size:22px; font-weight:600}
  .kpi .tick{position:absolute; right:0; top:0; bottom:0; width:3px}

  .grid{display:grid; grid-template-columns:repeat(12,1fr); gap:16px}
  .card{background:linear-gradient(180deg,var(--elev),var(--panel)); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px 18px; min-width:0}
  .card h2{font-family:"Space Grotesk"; font-size:14px; font-weight:600; margin:0 0 2px; letter-spacing:-.01em}
  .card p.hint{font-size:12px; color:var(--faint); margin:0 0 12px}
  .col-5{grid-column:span 5} .col-7{grid-column:span 7} .col-12{grid-column:span 12}
  .chart{width:100%} .h-chart{height:260px}

  .cat{padding:10px 0; border-bottom:1px solid var(--line)}
  .cat:last-child{border-bottom:0}
  .cat .top{display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:7px}
  .cat .nm{font-size:13.5px}
  .cat .amt{font-size:14px; font-weight:600; white-space:nowrap}
  .cat .amt .usd-m{color:var(--usd); margin-left:10px}
  .track{height:7px; border-radius:999px; background:var(--line); overflow:hidden}
  .track > i{display:block; height:100%; border-radius:999px}

  .mov{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:9px 0; border-bottom:1px solid var(--line); font-size:13.5px}
  .mov:last-child{border-bottom:0}
  .mov .cuando{color:var(--faint); white-space:nowrap; width:34px}
  .mov .que{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .mov .que small{color:var(--faint)}
  .mov .cuanto{white-space:nowrap; font-weight:600}
  .mov .cuanto.ing{color:var(--income)}

  .estado{color:var(--muted); padding:48px 0; text-align:center}
  footer{max-width:1100px; margin:20px auto 0; padding:0 22px; color:var(--faint); font-size:12px; line-height:1.6}

  .icon-btn{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;
    background:var(--panel);border:1px solid var(--line);border-radius:11px;color:var(--muted);cursor:pointer;transition:.18s}
  .icon-btn:hover{color:var(--text);border-color:var(--accent)}
  .icon-btn:focus-visible{outline:none;box-shadow:0 0 0 2px var(--accent-soft),0 0 0 1px var(--accent)}
  .icon-btn svg{width:18px;height:18px}
  .icon-btn .ico-moon{display:none}
  :root[data-theme="light"] .icon-btn .ico-sun{display:none}
  :root[data-theme="light"] .icon-btn .ico-moon{display:inline}

  :root[data-theme="light"]{
    --ink:#EDF1F8; --panel:#FFFFFF; --elev:#FFFFFF; --line:#E4EAF5;
    --text:#1B2436; --muted:#5A6A86; --faint:#9AA6BF;
    --shadow:0 1px 0 rgba(255,255,255,.7) inset, 0 14px 30px -22px rgba(31,45,74,.38);
  }
  :root[data-theme="light"] header{ background:linear-gradient(180deg,rgba(237,241,248,.92),rgba(237,241,248,.70)); }
  :root[data-theme="light"] .kpi, :root[data-theme="light"] .card{border-color:#E9EEF7}

  @media (max-width:900px){ .kpis{grid-template-columns:repeat(3,1fr)} .col-5,.col-7{grid-column:span 12} }
  @media (max-width:560px){ .bar{padding:12px 14px} main{padding:14px} .kpis{grid-template-columns:repeat(2,1fr)} }
  @media (prefers-reduced-motion:no-preference){ .track > i{transition:width .4s ease} }
</style>
<script>document.documentElement.setAttribute("data-theme",(window.matchMedia&&matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark");</script>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand">
      <span class="dot"></span>
      <h1>Registro financiero</h1>
    </div>
    <div class="links">
      <a href="<?= url ?>?page=analisis">Análisis</a>
      <a href="<?= url ?>?page=saldos">Saldos</a>
      <a href="<?= url ?>?pagina=conciliar">Conciliar</a>
      <a href="<?= url ?>?page=movil">Móvil</a>
    </div>
    <div class="controls">
      <div class="seg" role="group" aria-label="Mes">
        <button id="prev" aria-label="Mes anterior">‹</button>
        <span id="mes" class="num">&nbsp;</span>
        <button id="next" aria-label="Mes siguiente">›</button>
      </div>
      <button id="themeBtn" class="icon-btn" aria-label="Modo claro / oscuro" title="Modo claro / oscuro">
        <svg class="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg class="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
    </div>
  </div>
</header>

<main>
  <div id="contenido"><p class="estado">Leyendo el libro mayor…</p></div>
</main>
<footer id="pie"></footer>

<script>
const CAT_COLOR = {
  "Alimentación":"#34D399","Restaurantes/Delivery":"#FB923C","Transporte":"#38BDF8","Hogar":"#A78BFA",
  "Servicios/Suscripciones":"#818CF8","Salud":"#F472B6","Entretenimiento":"#FBBF24","Compras":"#2DD4BF",
  "Retiros efectivo":"#94A3B8","Educación":"#4ADE80","Otros":"#64748B","Gastos no especificados":"#475569"
};
const colorCat = c => CAT_COLOR[c] || "#64748B";
const fmt = (n) => n.toLocaleString('es-PE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

let offset = 0;
let LAST = null;
const charts = {};
function ec(id){ const el=document.getElementById(id); if(!el) return null; if(!charts[id]) charts[id]=echarts.init(el); return charts[id]; }
function themeColors(){
  const light = document.documentElement.getAttribute("data-theme")==="light";
  return light
    ? {text:"#1B2436",muted:"#5A6A86",line:"#E4EAF5",panel:"#FFFFFF",tip:"rgba(255,255,255,.98)"}
    : {text:"#E8ECF6",muted:"#8695B0",line:"#243049",panel:"#111827",tip:"rgba(17,24,39,.96)"};
}

/* ---------- tema ---------- */
function applyTheme(mode){ document.documentElement.setAttribute("data-theme", mode); }
applyTheme((window.matchMedia && matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark");
document.getElementById("themeBtn").addEventListener("click", ()=>{
  const next = document.documentElement.getAttribute("data-theme")==="light" ? "dark" : "light";
  applyTheme(next);
  if(LAST) renderDonut(LAST);
});
window.addEventListener("resize", ()=>Object.values(charts).forEach(c=>c.resize()));

/* ---------- carga ---------- */
function cargar(){
  document.getElementById('contenido').innerHTML = '<p class="estado">Leyendo el libro mayor…</p>';
  google.script.run
    .withSuccessHandler(pintar)
    .withFailureHandler(e => {
      document.getElementById('contenido').innerHTML =
        '<p class="estado">No se pudo leer el Sheet: ' + (e && e.message ? e.message : e) + '. Recarga la página.</p>';
    })
    .obtenerDatosTablero(offset);
}

function pintar(d){
  LAST = d;
  document.getElementById('mes').textContent = d.etiquetaMes;
  document.getElementById('next').disabled = d.offset >= 0;

  if(d.totalMovimientos === 0){
    document.getElementById('contenido').innerHTML =
      '<p class="estado">Sin movimientos en ' + esc(d.etiquetaMes) + '.</p>';
    document.getElementById('pie').textContent = '';
    return;
  }

  const balPEN = d.ingresos.PEN - d.gastos.PEN;
  const conc = (d.conciliacion && d.conciliacion.pct !== null) ? d.conciliacion.pct + '%' : '—';
  const tiles = [
    {lab:"Gastos", val:"S/ "+fmt(d.gastos.PEN), tick:"var(--expense)"},
    {lab:"Ingresos", val:"S/ "+fmt(d.ingresos.PEN), tick:"var(--income)"},
    {lab:"Balance", val:(balPEN>=0?"+":"−")+"S/ "+fmt(Math.abs(balPEN)), tick:balPEN>=0?"var(--income)":"var(--expense)", color:balPEN>=0?"var(--income)":"var(--expense)"},
    {lab:"Gastos US$", val:"US$ "+fmt(d.gastos.USD), tick:"var(--usd)"},
    {lab:"Ingresos US$", val:"US$ "+fmt(d.ingresos.USD), tick:"var(--income)"},
    {lab:"Conciliado", val:conc, tick:"var(--accent)"},
  ];
  const kpis = '<section class="kpis">' + tiles.map(t=>
    `<div class="kpi"><div class="tick" style="background:${t.tick}"></div>`+
    `<div class="lab">${t.lab}</div><div class="val num" style="${t.color?`color:${t.color}`:""}">${t.val}</div></div>`
  ).join('') + '</section>';

  const maxPEN = Math.max(1, ...d.categorias.map(c=>c.PEN));
  const cats = d.categorias.map(c=>
    `<div class="cat"><div class="top"><span class="nm">${esc(c.nombre)}</span>`+
    `<span class="amt num">${c.PEN>0?'S/ '+fmt(c.PEN):''}${c.USD>0?`<span class="usd-m">US$ ${fmt(c.USD)}</span>`:''}</span></div>`+
    `<div class="track"><i style="width:${(c.PEN/maxPEN*100).toFixed(1)}%;background:${colorCat(c.nombre)}"></i></div></div>`
  ).join('');

  const movs = d.recientes.map(m=>{
    const signo = m.tipo==='ingreso' ? '+' : '−';
    return `<div class="mov"><span class="cuando num">${esc(m.dia)}</span>`+
      `<span class="que">${esc(m.comercio)} <small>· ${esc(m.categoria)}</small></span>`+
      `<span class="cuanto num${m.tipo==='ingreso'?' ing':''}">${signo} ${m.moneda==='PEN'?'S/':'US$'} ${fmt(m.monto)}</span></div>`;
  }).join('');

  document.getElementById('contenido').innerHTML = kpis +
    '<section class="grid">' +
      '<div class="card col-5"><h2>Reparto del gasto</h2><p class="hint">Por categoría, en soles</p><div id="donut" class="chart h-chart"></div></div>' +
      '<div class="card col-7"><h2>Por categoría</h2><p class="hint">Gasto del mes; la barra es proporcional en PEN</p>' + cats + '</div>' +
      '<div class="card col-12"><h2>Últimos movimientos</h2><p class="hint">Lo más reciente del mes</p>' + movs + '</div>' +
    '</section>';

  renderDonut(d);

  let pie = d.totalMovimientos + ' movimientos en ' + d.etiquetaMes + ' · montos en moneda nativa, sin conversión';
  if(d.conciliacion && d.conciliacion.pct !== null){
    pie += ' · conciliado ' + d.conciliacion.pct + '% (' + d.conciliacion.conciliados + '/' + d.conciliacion.conciliables + ')';
  }
  document.getElementById('pie').textContent = pie;
}

function renderDonut(d){
  if(typeof echarts==="undefined") return;
  const g = (d.categorias||[]).filter(c=>c.PEN>0).sort((a,b)=>b.PEN-a.PEN);
  const chart = ec("donut");
  if(!chart) return;
  const th = themeColors();
  if(!g.length){
    chart.setOption({graphic:{type:"text",left:"center",top:"middle",style:{text:"Sin gastos en PEN",fill:th.muted,fontFamily:"Inter",fontSize:13}}}, true);
    return;
  }
  const total = g.reduce((a,c)=>a+c.PEN,0);
  chart.setOption({
    tooltip:{backgroundColor:th.tip,borderColor:th.line,borderWidth:1,textStyle:{color:th.text,fontFamily:"Inter",fontSize:12},extraCssText:"border-radius:10px",
      trigger:"item", formatter:p=>`${p.name}<br><b class="num">S/ ${fmt(p.value)}</b> · ${p.percent}%`},
    series:[{type:"pie", radius:["52%","82%"], center:["50%","52%"], padAngle:1.5,
      itemStyle:{borderColor:th.panel,borderWidth:2,borderRadius:4},
      label:{show:true,position:"center",
        formatter:()=>`{a|Gasto total}\n{b|S/ ${new Intl.NumberFormat("es-PE",{maximumFractionDigits:0}).format(total)}}`,
        rich:{a:{color:th.muted,fontSize:11,fontFamily:"Inter",padding:[0,0,4,0]},
              b:{color:th.text,fontSize:18,fontFamily:"Space Grotesk",fontWeight:600}}},
      labelLine:{show:false}, emphasis:{scale:true,scaleSize:6},
      data: g.map(c=>({name:c.nombre, value:+c.PEN.toFixed(2), itemStyle:{color:colorCat(c.nombre)}}))
    }]
  }, true);
  setTimeout(()=>chart.resize(), 40);
}

document.getElementById('prev').onclick = () => { offset--; cargar(); };
document.getElementById('next').onclick = () => { if(offset < 0){ offset++; cargar(); } };
cargar();
</script>
</body>
</html>
