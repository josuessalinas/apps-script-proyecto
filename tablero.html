<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<base target="_top">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<a href="<?= url ?>?page=analisis">Ver análisis →</a>
<style>
  :root{
  /* colores de marca (iguales en claro y oscuro) */
  --pen:#2962ff;   /* PEN → azul TradingView */
  --usd:#ff9800;   /* USD → naranja */
  --ingreso:#089981; /* verde alza */
  --gasto:#f23645;   /* rojo baja */
  }
  html[data-theme="dark"]{
  --papel:#131722; --tarjeta:#1e222d; --linea:#2a2e39; --linea-2:#363a45;
  --tinta:#d1d4dc; --tenue:#787b86; --alerta:#f23645; --sombra:0 6px 20px rgba(0,0,0,.40);
  }
  html[data-theme="light"]{
  --papel:#f8f9fd; --tarjeta:#ffffff; --linea:#e0e3eb; --linea-2:#d1d4dc;
  --tinta:#131722; --tenue:#787b86; --alerta:#f23645; --sombra:0 4px 14px rgba(19,23,34,.06);
  }

  
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--papel); color: var(--tinta);
    font: 15px/1.5 'IBM Plex Sans', system-ui, sans-serif;
    padding: 28px 18px 60px; max-width: 720px; margin: 0 auto;
  }
  .num { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }

  /* Cabecera con navegación de mes */
  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 22px; }
  h1 { font-size: 15px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
  h1 a { color: var(--tenue); text-decoration: none; font-weight: 400; font-size: 13px;
         letter-spacing: 0; text-transform: none; margin-left: 10px; }
  h1 a:hover { color: var(--tinta); }
  .nav { display: flex; align-items: center; gap: 10px; }
  .nav button {
    background: none; border: 1px solid var(--linea); border-radius: 4px;
    width: 30px; height: 30px; cursor: pointer; color: var(--tinta); font-size: 14px;
  }
  .nav button:hover { background: var(--tarjeta); }
  .nav button:focus-visible { outline: 2px solid var(--pen); outline-offset: 2px; }
  #mes { font-weight: 500; min-width: 130px; text-align: center; text-transform: capitalize; }

  /* Hero: dos monedas lado a lado, sin conversión */
  .totales {
    display: grid; grid-template-columns: 1fr 1fr; background: var(--tarjeta);
    border: 1px solid var(--linea); border-radius: 8px; overflow: hidden; margin-bottom: 26px;
  }
  .total { padding: 20px 22px; }
  .total + .total { border-left: 1px solid var(--linea); }
  .total .rotulo { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--tenue); }
  .total .cifra { font-size: 30px; font-weight: 600; margin-top: 6px; }
  .total.pen .cifra { color: var(--pen); }
  .total.usd .cifra { color: var(--usd); }
  .total .ingreso { font-size: 12.5px; color: var(--tenue); margin-top: 4px; }

  h2 { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--tenue);
       margin: 26px 0 10px; }

  /* Categorías: fila con barra proporcional en PEN */
  .cat { display: grid; grid-template-columns: 1fr auto; gap: 2px 14px; padding: 9px 2px;
         border-bottom: 1px solid var(--linea); }
  .cat .nombre { font-weight: 500; }
  .cat .montos { text-align: right; font-size: 14px; }
  .cat .montos .usd-m { color: var(--usd); margin-left: 10px; }
  .cat .barra { grid-column: 1 / -1; height: 4px; background: var(--linea); border-radius: 2px; }
  .cat .barra i { display: block; height: 100%; background: var(--pen); border-radius: 2px; }

  /* Movimientos recientes */
  .mov { display: flex; justify-content: space-between; gap: 12px; padding: 8px 2px;
         border-bottom: 1px solid var(--linea); font-size: 14px; }
  .mov .cuando { color: var(--tenue); white-space: nowrap; width: 52px; }
  .mov .que { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mov .que small { color: var(--tenue); }
  .mov .cuanto { white-space: nowrap; }
  .mov .cuanto.ing { color: var(--pen); }

  .estado { color: var(--tenue); padding: 40px 0; text-align: center; }
  footer { margin-top: 34px; font-size: 12.5px; color: var(--tenue); }

  @media (max-width: 480px) {
    .totales { grid-template-columns: 1fr; }
    .total + .total { border-left: 0; border-top: 1px solid var(--linea); }
  }
  @media (prefers-reduced-motion: no-preference) {
    .cat .barra i { transition: width .35s ease; }
  }
  .tema{width:32px;height:32px;border:1px solid var(--linea-2);background:var(--tarjeta);
  color:var(--tenue);border-radius:7px;display:grid;place-items:center;cursor:pointer;padding:0;}
  .tema:hover{color:var(--tinta);}
  .tema svg{width:16px;height:16px;display:none;}
  html[data-theme="dark"] .tema .i-sun{display:block;}
  html[data-theme="light"] .tema .i-moon{display:block;}
</style>
</head>
<body>
  <header>
    <h1>Registro financiero<a href="<?= url ?>?page=saldos">Saldos ›</a><a href="<?= url ?>?pagina=conciliar">Conciliar ›</a><a href="<?= url ?>?page=movil">Móvil ›</a></h1>
    <div class="nav">
      <button id="prev" aria-label="Mes anterior">‹</button>
      <span id="mes" class="num">&nbsp;</span>
      <button id="next" aria-label="Mes siguiente">›</button>
    </div>
    <button class="tema" id="tema" aria-label="Cambiar tema" title="Cambiar tema">
      <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
       <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
       </svg>
      <svg class="i-moon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
    </button>
  </header>

  <div id="contenido"><p class="estado">Leyendo el libro mayor…</p></div>

  <footer id="pie"></footer>

<script>
  let offset = 0;

  const fmt = (n) => n.toLocaleString('es-PE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  function cargar() {
    document.getElementById('contenido').innerHTML = '<p class="estado">Leyendo el libro mayor…</p>';
    google.script.run
      .withSuccessHandler(pintar)
      .withFailureHandler(e => {
        document.getElementById('contenido').innerHTML =
          '<p class="estado">No se pudo leer el Sheet: ' + e.message + '. Recarga la página.</p>';
      })
      .obtenerDatosTablero(offset);
  }

  function pintar(d) {
    document.getElementById('mes').textContent = d.etiquetaMes;
    document.getElementById('next').disabled = d.offset >= 0;

    if (d.totalMovimientos === 0) {
      document.getElementById('contenido').innerHTML =
        '<p class="estado">Sin movimientos en ' + d.etiquetaMes + '.</p>';
      document.getElementById('pie').textContent = '';
      return;
    }

    let html = '<div class="totales">' +
      bloqueTotal('pen', 'Gastos S/', d.gastos.PEN, d.ingresos.PEN, 'S/') +
      bloqueTotal('usd', 'Gastos US$', d.gastos.USD, d.ingresos.USD, 'US$') +
      '</div>';

    html += '<h2>Por categoría</h2>';
    const maxPEN = Math.max(1, ...d.categorias.map(c => c.PEN));
    d.categorias.forEach(c => {
      html += '<div class="cat"><span class="nombre">' + esc(c.nombre) + '</span>' +
        '<span class="montos num">' +
        (c.PEN > 0 ? 'S/ ' + fmt(c.PEN) : '') +
        (c.USD > 0 ? '<span class="usd-m">US$ ' + fmt(c.USD) + '</span>' : '') +
        '</span>' +
        '<span class="barra"><i style="width:' + (c.PEN / maxPEN * 100).toFixed(1) + '%"></i></span>' +
        '</div>';
    });

    html += '<h2>Últimos movimientos</h2>';
    d.recientes.forEach(m => {
      const signo = m.tipo === 'ingreso' ? '+' : '−';
      html += '<div class="mov">' +
        '<span class="cuando num">' + m.dia + '</span>' +
        '<span class="que">' + esc(m.comercio) + ' <small>· ' + esc(m.categoria) + '</small></span>' +
        '<span class="cuanto num' + (m.tipo === 'ingreso' ? ' ing' : '') + '">' +
        signo + ' ' + (m.moneda === 'PEN' ? 'S/' : 'US$') + ' ' + fmt(m.monto) + '</span>' +
        '</div>';
    });

    document.getElementById('contenido').innerHTML = html;
    let pie = d.totalMovimientos + ' movimientos en ' + d.etiquetaMes +
      ' · montos en moneda nativa, sin conversión';
    if (d.conciliacion && d.conciliacion.pct !== null) {
      pie += ' · conciliado ' + d.conciliacion.pct + '% (' +
        d.conciliacion.conciliados + '/' + d.conciliacion.conciliables + ')';
    }
    document.getElementById('pie').textContent = pie;
  }

  function bloqueTotal(clase, rotulo, gasto, ingreso, simbolo) {
    return '<div class="total ' + clase + '">' +
      '<div class="rotulo">' + rotulo + '</div>' +
      '<div class="cifra num">' + simbolo + ' ' + fmt(gasto) + '</div>' +
      (ingreso > 0 ? '<div class="ingreso num">ingresos + ' + simbolo + ' ' + fmt(ingreso) + '</div>' : '') +
      '</div>';
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  /* Tema: el dispositivo decide el arranque y el botón se registra UNA sola vez.
     Antes ambas cosas vivían dentro de cargar(), así que cada navegación de mes
     acumulaba un listener (tras N meses, un clic alternaba N+1 veces) y volvía
     a pisar la elección manual con la preferencia del sistema. */
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches){
    document.documentElement.setAttribute('data-theme','light');
  }
  document.getElementById('tema').addEventListener('click', function(){
    var cur = document.documentElement.getAttribute('data-theme');
    document.documentElement.setAttribute('data-theme', cur === 'light' ? 'dark' : 'light');
  });

  document.getElementById('prev').onclick = () => { offset--; cargar(); };
  document.getElementById('next').onclick = () => { if (offset < 0) { offset++; cargar(); } };
  cargar();
</script>
</body>
</html>
