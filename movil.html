<!DOCTYPE html>
<html lang="es" data-theme="dark" data-cur="PEN">
<head>
<base target="_top">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<style>
  :root{
    --amber:#FFA028; --cyan:#35A7DB; --up:#3FB950; --down:#E8453C;
    --pen:#FFA028; --usd:#35A7DB;
  }
  html[data-theme="dark"]{
    --bg:#0A0A0A; --panel:#101010; --panel2:#151515; --raised:#1C1C1C;
    --line:#242424; --line2:#333333;
    --text:#E6E6E6; --muted:#8C8C8C; --dim:#5A5A5A;
    --topbar:#000000; --onamber:#0A0A0A; --zebra:rgba(255,255,255,.018);
  }
  html[data-theme="light"]{
    --bg:#F4F0E9; --panel:#FFFFFF; --panel2:#FBF9F5; --raised:#EDE8DF;
    --line:#DAD3C7; --line2:#C3BAAA;
    --text:#14120E; --muted:#665E52; --dim:#8A8071;
    --topbar:#17140F; --onamber:#17140F; --zebra:rgba(0,0,0,.016);
    --amber:#8A5000; --cyan:#125F8C; --up:#136B3C; --down:#AF2015;
    --pen:#8A5000; --usd:#125F8C;
  }
  html[data-cur="PEN"]{--acc:var(--pen)}
  html[data-cur="USD"]{--acc:var(--usd)}

  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);
       font:400 13px/1.45 'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
       -webkit-font-smoothing:antialiased;
       padding-bottom:calc(10px + env(safe-area-inset-bottom))}
  .num{font-variant-numeric:tabular-nums}

  .top{position:sticky;top:0;z-index:30;display:flex;align-items:stretch;height:32px;
       background:var(--topbar);border-bottom:1px solid var(--line2)}
  .tag{background:var(--amber);color:var(--onamber);font-weight:700;font-size:10.5px;
       letter-spacing:.14em;display:flex;align-items:center;padding:0 10px}
  .ttl{display:flex;align-items:center;padding:0 11px;font-size:10.5px;font-weight:600;
       letter-spacing:.16em;color:#E6E6E6}
  nav{display:flex;align-items:stretch;margin-left:auto}
  nav a,.navbtn{display:flex;align-items:center;padding:0 11px;color:#8C8C8C;
       text-decoration:none;font:600 10.5px/1 'IBM Plex Mono',monospace;letter-spacing:.1em;
       border:0;border-left:1px solid #2A2A2A;background:transparent;cursor:pointer}
  nav a:hover,.navbtn:hover{background:#1C1C1C;color:#E6E6E6}
  .navbtn svg{width:14px;height:14px;display:none}
  html[data-theme="dark"] .navbtn .i-sun{display:block}
  html[data-theme="light"] .navbtn .i-moon{display:block}

  /* selector de moneda: pestañas de terminal */
  .seg{display:flex;border-bottom:1px solid var(--line);background:var(--panel2)}
  .seg button{flex:1;border:0;background:transparent;color:var(--dim);
       font:600 11px/1 'IBM Plex Mono',monospace;letter-spacing:.16em;
       padding:9px 0;cursor:pointer;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:0}
  .seg button.on{color:var(--acc);background:var(--panel);
       box-shadow:inset 0 -2px 0 var(--acc)}

  main{padding:10px;max-width:520px;margin:0 auto}

  .pnl{border:1px solid var(--line);background:var(--panel);margin-bottom:10px}
  .pnl-h{display:flex;align-items:center;justify-content:space-between;
         background:var(--amber);color:var(--onamber);padding:4px 9px;
         font-size:9.5px;font-weight:700;letter-spacing:.15em}
  .pnl-h .r{font-weight:500;letter-spacing:.09em;opacity:.78}

  table{width:100%;border-collapse:collapse}
  tbody td{padding:6px 9px;border-bottom:1px solid var(--line);font-size:12px}
  tbody tr:nth-child(even){background:var(--zebra)}
  tbody tr:last-child td{border-bottom:0}
  td.sw{width:3px;padding:0}
  td.sw i{display:block;width:3px;height:26px;background:var(--c)}
  td.d{max-width:0;overflow:hidden}
  td.d b{display:block;font-weight:500;font-size:12.5px;
         white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  td.d small{color:var(--dim);font-size:10px;letter-spacing:.06em}
  td.a{text-align:right;white-space:nowrap;font-size:12.5px}
  .sym{color:var(--dim);font-size:10px;margin-right:2px}

  .chart{width:100%}
  #c7{height:172px} #cDonut{height:214px} #cPago{height:172px}

  .leyenda{display:flex;gap:14px;padding:6px 9px 8px;font-size:9.5px;
           letter-spacing:.1em;color:var(--dim);border-top:1px solid var(--line)}
  .leyenda i{display:inline-block;width:8px;height:8px;margin-right:5px;vertical-align:-1px}

  .vacio{padding:24px 9px;text-align:center;color:var(--dim);font-size:11px;letter-spacing:.12em}
  .vacio .blink{color:var(--amber);animation:bk 1.05s steps(2,start) infinite}
  @keyframes bk{to{visibility:hidden}}

  footer{padding:4px 10px 0;font-size:9.5px;letter-spacing:.1em;color:var(--dim);text-align:center}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<div class="top">
  <span class="tag">FIN</span>
  <span class="ttl">MÓVIL</span>
  <nav>
    <a href="<?= url ?>">TABLERO</a>
    <button class="navbtn" id="tema" aria-label="Cambiar tema" title="Cambiar tema">
      <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg class="i-moon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
    </button>
  </nav>
</div>

<div class="seg" id="seg">
  <button data-cur="PEN" class="on">S/ &nbsp;PEN</button>
  <button data-cur="USD">US$ &nbsp;USD</button>
</div>

<main id="app">
  <p class="vacio"><span class="blink">█</span> LEYENDO LIBRO MAYOR…</p>
</main>

<footer>MONEDA NATIVA · SIN CONVERSIÓN</footer>

<script>
/* ================= TEMA ================= */
var TEMA = (function(){
  var g = null; try { g = localStorage.getItem('tema'); } catch(e){}
  if (g === 'light' || g === 'dark') return g;
  return (window.matchMedia && matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
})();
function aplicarTema(t){
  TEMA = t;
  document.documentElement.setAttribute('data-theme', t);
  try { localStorage.setItem('tema', t); } catch(e){}
}
aplicarTema(TEMA);
document.getElementById('tema').addEventListener('click', function(){
  aplicarTema(TEMA === 'light' ? 'dark' : 'light');
  if (montado) render();          // los gráficos se repintan con la paleta nueva
});

/* ================= ESTADO ================= */
var S = { cur:'PEN', mov:[] };
var SIMB = { PEN:'S/', USD:'US$' };
var MES3 = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];

/* Lee la paleta viva del CSS: un solo origen de verdad para tema claro/oscuro. */
function css(v){
  return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
}
function CO(){
  return { amber:css('--amber'), cyan:css('--cyan'), up:css('--up'), down:css('--down'),
           text:css('--text'), muted:css('--muted'), dim:css('--dim'),
           line:css('--line'), panel:css('--panel'), acc:css('--acc') };
}

var CAT_COLOR = {
  'Alimentación':'#FFA028','Restaurantes/Delivery':'#F0883E','Transporte':'#35A7DB',
  'Hogar':'#A371F7','Servicios/Suscripciones':'#4C8EDA','Salud':'#DB61A2',
  'Entretenimiento':'#E3B341','Compras':'#39C5BB','Retiros efectivo':'#8B949E',
  'Educación':'#3FB950','Otros':'#7D8590','sin_categoria':'#5A5A5A'
};
function catColor(c){ return CAT_COLOR[c] || '#7D8590'; }
function catLabel(c){ return (c === 'sin_categoria' ? 'SIN CATEGORÍA' : c).toUpperCase(); }

var MET_LABEL = { tarjeta_debito:'T. DÉBITO', tarjeta_credito:'T. CRÉDITO',
  cuenta:'CUENTA', efectivo:'EFECTIVO', yape:'YAPE', plin:'PLIN', transferencia:'TRANSFER.' };
function metLabel(x){
  if (MET_LABEL[x]) return MET_LABEL[x];
  if (!x) return 'OTRO';
  return String(x).replace(/_/g,' ').toUpperCase();
}

/* ================= UTILIDADES ================= */
function iso(d){
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') +
         '-' + String(d.getDate()).padStart(2,'0');
}
function parseF(f){ var p = String(f).split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }
function fmt(n){
  return n.toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtC(n){ return SIMB[S.cur] + ' ' + fmt(n); }
function enMoneda(){ return S.mov.filter(function(m){ return m.cur === S.cur; }); }
function esc(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

/* ================= CARGA ================= */
function normalizar(resp){
  var arr = (resp && resp.movimientos) ? resp.movimientos : [];
  S.mov = arr.map(function(r){
    return { f:String(r.f), t:String(r.t), m:Number(r.m),
             cur:String(r.cur||'PEN').toUpperCase(),
             cat:String(r.cat||'Otros'), com:String(r.com||'—'), met:String(r.met||'') };
  });
  render();
}
function cargar(){
  if (typeof google !== 'undefined' && google.script && google.script.run){
    google.script.run
      .withSuccessHandler(normalizar)
      .withFailureHandler(function(e){
        document.getElementById('app').innerHTML =
          '<p class="vacio" style="color:var(--down)">ERROR DE LECTURA · ' +
          esc(e && e.message ? e.message : e) + '</p>';
      })
      .obtenerDatosAnalisis();
  } else {
    normalizar(generarMuestra());   // fuera de Apps Script (vista previa)
  }
}

/* ================= ESTRUCTURA (una sola vez) ================= */
var ch7, chDonut, chPago, montado = false;
function montar(){
  document.getElementById('app').innerHTML =
    '<section class="pnl">' +
      '<div class="pnl-h"><span>ÚLTIMOS GASTOS</span><span class="r" id="marcaMon">S/</span></div>' +
      '<table><tbody id="lista"></tbody></table>' +
    '</section>' +
    '<section class="pnl">' +
      '<div class="pnl-h"><span>FLUJO · 7 DÍAS</span><span class="r">DIARIO</span></div>' +
      '<div id="c7" class="chart"></div>' +
      '<div class="leyenda"><span><i id="lgG"></i>GASTOS</span><span><i id="lgI"></i>INGRESOS</span></div>' +
    '</section>' +
    '<section class="pnl">' +
      '<div class="pnl-h"><span>DISTRIBUCIÓN</span><span class="r">MES ACTUAL</span></div>' +
      '<div id="cDonut" class="chart"></div>' +
    '</section>' +
    '<section class="pnl">' +
      '<div class="pnl-h"><span>MÉTODO DE PAGO</span><span class="r">30 DÍAS</span></div>' +
      '<div id="cPago" class="chart"></div>' +
    '</section>';
  ch7 = echarts.init(document.getElementById('c7'), null, {renderer:'svg'});
  chDonut = echarts.init(document.getElementById('cDonut'), null, {renderer:'svg'});
  chPago = echarts.init(document.getElementById('cPago'), null, {renderer:'svg'});
  window.addEventListener('resize', function(){
    ch7.resize(); chDonut.resize(); chPago.resize();
  });
  montado = true;
}

function ttip(){
  var c = CO();
  return { backgroundColor:c.panel, borderColor:c.line, borderWidth:1,
           textStyle:{color:c.text, fontFamily:'IBM Plex Mono', fontSize:11},
           extraCssText:'border-radius:0;box-shadow:0 6px 18px rgba(0,0,0,.35)' };
}
function ejeBase(){
  var c = CO();
  return { axisLine:{lineStyle:{color:c.line}}, axisTick:{show:false},
           axisLabel:{color:c.dim, fontFamily:'IBM Plex Mono', fontSize:9.5},
           splitLine:{lineStyle:{color:c.line, type:'dashed'}} };
}

/* ================= RENDER ================= */
function render(){
  if (!montado) montar();
  renderLista(); render7(); renderDonut(); renderPago();
}

/* 1) Últimos 5 gastos */
function renderLista(){
  document.getElementById('marcaMon').textContent = SIMB[S.cur];
  var g = enMoneda().filter(function(m){ return m.t === 'gasto'; })
    .sort(function(a,b){ return a.f < b.f ? 1 : a.f > b.f ? -1 : 0; }).slice(0,5);
  var cont = document.getElementById('lista');
  if (!g.length){
    cont.innerHTML = '<tr><td class="vacio">SIN GASTOS EN ' + S.cur + '</td></tr>';
    return;
  }
  cont.innerHTML = g.map(function(x){
    var d = parseF(x.f), fecha = d.getDate() + ' ' + MES3[d.getMonth()];
    return '<tr>' +
      '<td class="sw"><i style="--c:' + catColor(x.cat) + '"></i></td>' +
      '<td class="d"><b>' + esc(x.com) + '</b>' +
        '<small>' + esc(catLabel(x.cat)) + ' · ' + fecha + '</small></td>' +
      '<td class="a num"><span class="sym">' + SIMB[S.cur] + '</span>' + fmt(x.m) + '</td></tr>';
  }).join('');
}

/* 2) Flujo 7 días */
function render7(){
  var c = CO();
  document.getElementById('lgG').style.background = c.down;
  document.getElementById('lgI').style.background = c.up;

  var hoy = new Date(); hoy.setHours(0,0,0,0);
  var keys = [], labels = [];
  for (var i=6;i>=0;i--){
    var d = new Date(hoy); d.setDate(hoy.getDate()-i);
    keys.push(iso(d)); labels.push(d.getDate() + '/' + MES3[d.getMonth()]);
  }
  var g = {}, ing = {};
  keys.forEach(function(k){ g[k]=0; ing[k]=0; });
  enMoneda().forEach(function(m){
    if (m.f in g){ if (m.t==='gasto') g[m.f]+=m.m; else ing[m.f]+=m.m; }
  });
  var serieG = keys.map(function(k){ return +g[k].toFixed(2); });
  var serieI = keys.map(function(k){ return +ing[k].toFixed(2); });

  ch7.setOption({
    grid:{left:4,right:10,top:10,bottom:16,containLabel:true},
    tooltip:Object.assign({trigger:'axis', valueFormatter:function(v){ return fmtC(v); }}, ttip()),
    xAxis:Object.assign({type:'category', data:labels, boundaryGap:false}, ejeBase(),
      {splitLine:{show:false}}),
    yAxis:Object.assign({type:'value'}, ejeBase(),
      {axisLabel:{color:c.dim, fontFamily:'IBM Plex Mono', fontSize:9,
        formatter:function(v){ return v>=1000 ? (v/1000)+'k' : v; }}}),
    series:[
      {name:'Gastos', type:'line', step:'end', symbol:'none', data:serieG,
       lineStyle:{width:1.6, color:c.down},
       areaStyle:{color:c.down, opacity:.10}},
      {name:'Ingresos', type:'line', step:'end', symbol:'none', data:serieI,
       lineStyle:{width:1.6, color:c.up},
       areaStyle:{color:c.up, opacity:.10}}
    ]
  }, true);
}

/* 3) Distribución del mes */
function renderDonut(){
  var c = CO();
  var pref = iso(new Date()).slice(0,7);
  var map = {};
  enMoneda().forEach(function(m){
    if (m.t==='gasto' && m.f.slice(0,7)===pref) map[m.cat] = (map[m.cat]||0) + m.m;
  });
  var data = Object.keys(map).map(function(k){
    return { name:catLabel(k), value:+map[k].toFixed(2), itemStyle:{color:catColor(k)} };
  }).sort(function(a,b){ return b.value-a.value; });
  var total = data.reduce(function(s,d){ return s+d.value; }, 0);

  if (!data.length){
    chDonut.clear();
    chDonut.setOption({ graphic:{type:'text',left:'center',top:'middle',
      style:{text:'SIN GASTOS ESTE MES', fill:c.dim, fontSize:11,
             fontFamily:'IBM Plex Mono'}} });
    return;
  }
  chDonut.setOption({
    tooltip:Object.assign({valueFormatter:function(v){ return fmtC(v); }}, ttip()),
    legend:{bottom:0, left:'center', icon:'rect', itemWidth:8, itemHeight:8, itemGap:10,
      textStyle:{color:c.dim, fontSize:9.5, fontFamily:'IBM Plex Mono'}},
    series:[{
      type:'pie', radius:['58%','78%'], center:['50%','43%'], avoidLabelOverlap:true,
      itemStyle:{borderColor:c.panel, borderWidth:1.5, borderRadius:0},
      label:{show:true, position:'center',
        formatter:function(){
          return '{a|' + SIMB[S.cur] + ' ' +
            total.toLocaleString('es-PE',{maximumFractionDigits:0}) + '}\n{b|TOTAL MES}';
        },
        rich:{ a:{color:c.text, fontSize:17, fontWeight:600, fontFamily:'IBM Plex Mono'},
               b:{color:c.dim, fontSize:9.5, padding:[4,0,0,0], fontFamily:'IBM Plex Mono',
                  letterSpacing:1} }},
      labelLine:{show:false}, emphasis:{label:{show:true}}, data:data
    }]
  }, true);
}

/* 4) Método de pago · 30 días */
function renderPago(){
  var c = CO();
  var hoy = new Date(); var lim = new Date(hoy); lim.setDate(hoy.getDate()-30);
  var limKey = iso(lim);
  var map = {};
  enMoneda().forEach(function(m){
    if (m.t==='gasto' && m.f >= limKey) map[m.met] = (map[m.met]||0) + m.m;
  });
  var arr = Object.keys(map).map(function(k){ return { k:metLabel(k), v:+map[k].toFixed(2) }; })
    .sort(function(a,b){ return a.v-b.v; });

  if (!arr.length){
    chPago.clear();
    chPago.setOption({ graphic:{type:'text',left:'center',top:'middle',
      style:{text:'SIN DATOS', fill:c.dim, fontSize:11, fontFamily:'IBM Plex Mono'}} });
    return;
  }
  chPago.setOption({
    grid:{left:4, right:56, top:4, bottom:4, containLabel:true},
    tooltip:Object.assign({valueFormatter:function(v){ return fmtC(v); }}, ttip()),
    xAxis:{type:'value', splitLine:{show:false}, axisLabel:{show:false},
           axisTick:{show:false}, axisLine:{show:false}},
    yAxis:{type:'category', data:arr.map(function(x){ return x.k; }),
      axisLine:{show:false}, axisTick:{show:false},
      axisLabel:{color:c.muted, fontSize:10, fontFamily:'IBM Plex Mono'}},
    series:[{
      type:'bar', data:arr.map(function(x){ return x.v; }), barWidth:11,
      itemStyle:{ color:c.acc, borderRadius:0 },
      label:{show:true, position:'right', color:c.dim, fontSize:9.5,
        fontFamily:'IBM Plex Mono',
        formatter:function(p){ return fmt(p.value); }}
    }]
  }, true);
}

/* ================= TOGGLE DE MONEDA ================= */
document.getElementById('seg').addEventListener('click', function(e){
  var b = e.target.closest('button'); if (!b) return;
  S.cur = b.getAttribute('data-cur');
  document.documentElement.setAttribute('data-cur', S.cur);
  Array.prototype.forEach.call(document.querySelectorAll('#seg button'), function(x){
    x.classList.toggle('on', x.getAttribute('data-cur') === S.cur);
  });
  render();
});

/* ================= MUESTRA (solo fuera de Apps Script) ================= */
function generarMuestra(){
  var comercios = {
    'Alimentación':['PLAZA VEA','TOTTUS','WONG','METRO'],
    'Restaurantes/Delivery':['RAPPI','PEDIDOSYA','BEMBOS','LA LUCHA'],
    'Transporte':['UBER','INDRIVE','PRIMAX','PEAJE'],
    'Hogar':['SODIMAC','PROMART'],
    'Servicios/Suscripciones':['NETFLIX','SPOTIFY','CLARO','LUZ DEL SUR'],
    'Salud':['INKAFARMA','MIFARMA'], 'Entretenimiento':['CINEPLANET','STEAM'],
    'Compras':['FALABELLA','RIPLEY','H&M'], 'Retiros efectivo':['CAJERO BCP'],
    'Educación':['PLATZI','UDEMY'], 'Otros':['VARIOS']
  };
  var mets = ['tarjeta_credito','tarjeta_debito','yape','plin','efectivo','transferencia'];
  var cats = Object.keys(comercios);
  var pick = function(a){ return a[Math.floor(Math.random()*a.length)]; };
  var out = [], hoy = new Date();
  for (var dd=0; dd<95; dd++){
    var d = new Date(hoy); d.setDate(hoy.getDate()-dd);
    var f = iso(d);
    ['PEN','USD'].forEach(function(cur){
      var base = cur==='PEN' ? 3 : 1;
      var n = Math.max(0, Math.round(base*Math.random() + (dd<7?0.6:0)));
      for (var k=0;k<n;k++){
        var cat = pick(cats), rango = cur==='PEN'?[8,240]:[3,90];
        out.push({ f:f, t:'gasto', m:+(rango[0]+Math.random()*(rango[1]-rango[0])).toFixed(2),
          cur:cur, cat:cat, com:pick(comercios[cat]), met:pick(mets) });
      }
    });
    if (d.getDate()===1) out.push({f:f,t:'ingreso',m:1200,cur:'PEN',cat:'Otros',com:'SUELDO',met:'cuenta'});
    if (dd%15===2) out.push({f:f,t:'ingreso',m:+(120+Math.random()*360).toFixed(2),
      cur: Math.random()<.5?'PEN':'USD', cat:'Otros', com:'FREELANCE', met:'transferencia'});
  }
  return { movimientos: out, generado: new Date().toISOString() };
}

cargar();
</script>
</body>
</html>
