<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Registrar movimiento</title>
<base target="_top">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A0E17; --panel:#111827; --elev:#161F33; --line:#243049;
    --text:#E8ECF6; --muted:#8695B0; --faint:#5A6684;
    --accent:#A78BFA; --accent-soft:rgba(167,139,250,.14);
    --income:#34D399; --expense:#FB7185; --savings:#FBBF24;
    --radius:16px;
    --shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 12px 32px -18px rgba(0,0,0,.8);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(167,139,250,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(56,189,248,.06), transparent 55%),
      var(--ink);
    color:var(--text); font-family:Inter,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; padding-bottom:56px;
  }
  .num{font-family:"Space Grotesk",Inter,sans-serif; font-variant-numeric:tabular-nums; letter-spacing:-.01em}

  header{
    position:sticky; top:0; z-index:20; backdrop-filter:blur(14px);
    background:linear-gradient(180deg,rgba(10,14,23,.92),rgba(10,14,23,.72));
    border-bottom:1px solid var(--line);
  }
  .bar{max-width:640px; margin:0 auto; padding:14px 22px; display:flex; align-items:center; gap:16px}
  .brand{display:flex; align-items:center; gap:12px; margin-right:auto}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .brand h1{font-family:"Space Grotesk"; font-size:18px; font-weight:600; margin:0; letter-spacing:-.02em}
  .back{display:inline-flex;align-items:center;justify-content:center;height:30px;padding:0 12px;border-radius:9px;
    color:var(--muted);text-decoration:none;border:1px solid var(--line);font-size:13px;transition:.18s}
  .back:hover{color:var(--text);border-color:var(--accent)}

  main{max-width:640px; margin:0 auto; padding:22px}

  .card{background:linear-gradient(180deg,var(--elev),var(--panel)); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px 22px}
  label{display:block; font-size:11px; text-transform:uppercase; letter-spacing:.09em; color:var(--muted); margin:16px 0 6px}
  label:first-child{margin-top:0}
  input,select{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:10px;
    background:var(--panel); font-family:Inter; font-size:14px; color:var(--text);
  }
  input:focus-visible,select:focus-visible{outline:none; box-shadow:0 0 0 2px var(--accent-soft),0 0 0 1px var(--accent)}
  .fila{display:flex; gap:12px}
  .fila > div{flex:1; min-width:0}

  .seg{display:flex; background:var(--panel); border:1px solid var(--line); border-radius:11px; padding:3px; gap:2px}
  .seg button{
    flex:1; font-family:"Space Grotesk"; font-weight:600; font-size:13px; color:var(--muted);
    background:transparent; border:0; padding:9px 6px; border-radius:8px; cursor:pointer; transition:.18s;
  }
  .seg button[aria-pressed="true"]{background:var(--accent-soft); color:var(--text); box-shadow:0 0 0 1px var(--accent) inset}

  .btn-go{
    margin-top:22px; width:100%; padding:12px; border:0; border-radius:11px;
    background:var(--accent); color:#0A0E17; font-family:"Space Grotesk"; font-weight:600; font-size:15px; cursor:pointer; transition:.15s;
  }
  .btn-go:hover:not(:disabled){filter:brightness(1.06)}
  .btn-go:disabled{opacity:.5; cursor:default}

  #estado{margin-top:16px; font-size:14px; min-height:20px; color:var(--muted)}
  #estado.ok{color:var(--income)}
  #estado.error{color:var(--expense)}
  #catWrap.oculto{display:none}

  .icon-btn{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;
    background:var(--panel);border:1px solid var(--line);border-radius:11px;color:var(--muted);cursor:pointer;transition:.18s}
  .icon-btn:hover{color:var(--text);border-color:var(--accent)}
  .icon-btn svg{width:18px;height:18px}
  .icon-btn .ico-moon{display:none}
  :root[data-theme="light"] .icon-btn .ico-sun{display:none}
  :root[data-theme="light"] .icon-btn .ico-moon{display:inline}

  :root[data-theme="light"]{
    --ink:#EDF1F8; --panel:#FFFFFF; --elev:#FFFFFF; --line:#E4EAF5;
    --text:#1B2436; --muted:#5A6A86; --faint:#9AA6BF;
    --shadow:0 1px 0 rgba(255,255,255,.7) inset, 0 14px 30px -22px rgba(31,45,74,.38);
  }
  :root[data-theme="light"] header{ background:linear-gradient(180deg,rgba(237,241,248,.92),rgba(237,241,248,.70)); }
  :root[data-theme="light"] .card{border-color:#E9EEF7}

  @media (max-width:560px){ .bar{padding:12px 14px} main{padding:14px} .fila{flex-direction:column; gap:0} }
</style>
<script>document.documentElement.setAttribute("data-theme",(window.matchMedia&&matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark");</script>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand">
      <span class="dot"></span>
      <h1>Registrar movimiento</h1>
    </div>
    <a class="back" href="<?= url ?>">‹ Tablero</a>
    <button id="themeBtn" class="icon-btn" aria-label="Modo claro / oscuro" title="Modo claro / oscuro">
      <svg class="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg class="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
    </button>
  </div>
</header>

<main>
  <div class="card">
    <label>Tipo</label>
    <div class="seg" id="segTipo" role="group" aria-label="Tipo">
      <button type="button" data-v="gasto" aria-pressed="true">Gasto</button>
      <button type="button" data-v="ingreso" aria-pressed="false">Ingreso</button>
      <button type="button" data-v="traspaso" aria-pressed="false">Traspaso</button>
    </div>

    <div class="fila">
      <div>
        <label for="monto">Monto</label>
        <input type="number" id="monto" inputmode="decimal" step="0.01" min="0" placeholder="0.00">
      </div>
      <div>
        <label>Moneda</label>
        <div class="seg" id="segMon" role="group" aria-label="Moneda">
          <button type="button" data-v="PEN" aria-pressed="true">S/ PEN</button>
          <button type="button" data-v="USD" aria-pressed="false">US$ USD</button>
        </div>
      </div>
    </div>

    <label for="comercio">Descripción / comercio</label>
    <input type="text" id="comercio" maxlength="120" placeholder="Ej. Almuerzo, Uber, Sueldo…">

    <div class="fila">
      <div>
        <label for="fecha">Fecha</label>
        <input type="date" id="fecha">
      </div>
      <div id="catWrap">
        <label for="categoria">Categoría</label>
        <select id="categoria"></select>
      </div>
    </div>

    <div class="fila">
      <div>
        <label for="metodo">Método de pago</label>
        <select id="metodo"></select>
      </div>
      <div>
        <label for="banco">Banco / cuenta</label>
        <select id="banco"></select>
      </div>
    </div>

    <button id="btn" class="btn-go" type="button">Guardar movimiento</button>
    <div id="estado"></div>
  </div>
</main>

<script>
  const $ = id => document.getElementById(id);
  let tipo = 'gasto', moneda = 'PEN';

  /* ---------- tema ---------- */
  function applyTheme(mode){ document.documentElement.setAttribute("data-theme", mode); }
  applyTheme((window.matchMedia && matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark");
  $('themeBtn').addEventListener("click", ()=>{
    const next = document.documentElement.getAttribute("data-theme")==="light" ? "dark" : "light";
    applyTheme(next);
  });

  /* ---------- opciones ---------- */
  const CATS = ["Alimentación","Restaurantes/Delivery","Transporte","Hogar","Servicios/Suscripciones","Salud","Entretenimiento","Compras","Retiros efectivo","Educación","Otros"];
  const METODOS = [
    ["tarjeta_debito","Tarjeta de débito"],["tarjeta_credito","Tarjeta de crédito"],
    ["yape","Yape"],["plin","Plin"],["transferencia","Transferencia"],
    ["retiro_cajero","Retiro en cajero"],["pago_servicio","Pago de servicio"],
    ["efectivo","Efectivo"],["otro","Otro"]
  ];
  const BANCOS = [["","—"],["BCP","BCP"],["BBVA","BBVA"],["Efectivo","Efectivo"]];

  $('categoria').innerHTML = ['<option value="">(automática)</option>']
    .concat(CATS.map(c=>`<option value="${c}">${c}</option>`))
    .concat('<option value="sin_categoria">Sin categoría</option>').join('');
  $('metodo').innerHTML = METODOS.map(m=>`<option value="${m[0]}">${m[1]}</option>`).join('');
  $('banco').innerHTML = BANCOS.map(b=>`<option value="${b[0]}">${b[1]}</option>`).join('');

  /* fecha por defecto: hoy */
  (function(){
    const d = new Date();
    $('fecha').value = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  })();

  /* ---------- segmentados ---------- */
  function bindSeg(id, cb){
    $(id).addEventListener('click', e=>{
      const b = e.target.closest('button'); if(!b) return;
      [...e.currentTarget.children].forEach(x=>x.setAttribute('aria-pressed', x===b ? 'true':'false'));
      cb(b.getAttribute('data-v'));
    });
  }
  bindSeg('segTipo', v=>{ tipo = v; $('catWrap').classList.toggle('oculto', v==='traspaso'); });
  bindSeg('segMon', v=>{ moneda = v; });

  /* ---------- guardar ---------- */
  function estado(msg, cls){ $('estado').textContent = msg; $('estado').className = cls || ''; }

  $('btn').addEventListener('click', ()=>{
    const monto = parseFloat($('monto').value);
    const comercio = $('comercio').value.trim();
    if(!(monto > 0)){ estado('Ingresa un monto mayor que cero.', 'error'); return; }
    if(!comercio){ estado('Ingresa una descripción.', 'error'); return; }

    const datos = {
      tipo: tipo, moneda: moneda, monto: monto, comercio: comercio,
      fecha: $('fecha').value,
      categoria: tipo==='traspaso' ? '' : $('categoria').value,
      metodo: $('metodo').value, banco: $('banco').value
    };

    $('btn').disabled = true;
    estado('Guardando…', '');
    google.script.run
      .withSuccessHandler(r=>{
        $('btn').disabled = false;
        estado((r && r.mensaje) ? '✓ ' + r.mensaje : '✓ Registrado.', 'ok');
        $('monto').value = ''; $('comercio').value = ''; $('monto').focus();
      })
      .withFailureHandler(e=>{
        $('btn').disabled = false;
        estado('No se pudo guardar: ' + (e && e.message ? e.message : e), 'error');
      })
      .registrarMovimientoManual(datos);
  });
</script>
</body>
</html>
