<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Conciliar estado de cuenta</title>
<base target="_top">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --ink:#0A0E17; --panel:#111827; --elev:#161F33; --line:#243049;
    --text:#E8ECF6; --muted:#8695B0; --faint:#5A6684;
    --accent:#A78BFA; --accent-soft:rgba(167,139,250,.14);
    --income:#34D399; --expense:#FB7185;
    --radius:16px;
    --shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 12px 32px -18px rgba(0,0,0,.8);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(167,139,250,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(56,189,248,.06), transparent 55%),
      var(--ink);
    color:var(--text); font-family:Inter,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; padding-bottom:56px;
  }
  .num{font-family:"Space Grotesk",Inter,sans-serif; font-variant-numeric:tabular-nums; letter-spacing:-.01em}

  header{
    position:sticky; top:0; z-index:20; backdrop-filter:blur(14px);
    background:linear-gradient(180deg,rgba(10,14,23,.92),rgba(10,14,23,.72));
    border-bottom:1px solid var(--line);
  }
  .bar{max-width:640px; margin:0 auto; padding:14px 22px; display:flex; align-items:center; gap:16px}
  .brand{display:flex; align-items:center; gap:12px; margin-right:auto}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .brand h1{font-family:"Space Grotesk"; font-size:18px; font-weight:600; margin:0; letter-spacing:-.02em}
  .back{display:inline-flex;align-items:center;justify-content:center;height:30px;padding:0 12px;border-radius:9px;
    color:var(--muted);text-decoration:none;border:1px solid var(--line);font-size:13px;transition:.18s}
  .back:hover{color:var(--text);border-color:var(--accent)}

  main{max-width:640px; margin:0 auto; padding:22px}
  .nota{color:var(--faint); font-size:13px; line-height:1.5; margin:0 0 18px}

  .card{background:linear-gradient(180deg,var(--elev),var(--panel)); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px 22px}
  label{display:block; font-size:11px; text-transform:uppercase; letter-spacing:.09em; color:var(--muted); margin:16px 0 6px}
  label:first-child{margin-top:0}
  input[type=file],input[type=password],select{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:10px;
    background:var(--panel); font-family:Inter; font-size:14px; color:var(--text);
  }
  input:focus-visible,select:focus-visible{outline:none; box-shadow:0 0 0 2px var(--accent-soft),0 0 0 1px var(--accent)}
  .btn-go{
    margin-top:20px; width:100%; padding:12px; border:0; border-radius:11px;
    background:var(--accent); color:#0A0E17; font-family:"Space Grotesk"; font-weight:600; font-size:15px; cursor:pointer; transition:.15s;
  }
  .btn-go:hover:not(:disabled){filter:brightness(1.06)}
  .btn-go:disabled{opacity:.5; cursor:default}

  #estado{margin-top:16px; color:var(--muted); font-size:14px; min-height:20px}
  #estado.error{color:var(--expense)}

  #resultado{display:none; margin-top:18px}
  .pct{font-family:"Space Grotesk"; font-size:40px; font-weight:600; color:var(--accent)}
  .pct small{font-size:14px; color:var(--muted); font-weight:400; margin-left:10px; font-family:Inter}
  .metricas{color:var(--muted); font-size:13.5px; margin-top:6px; line-height:1.5}
  h2{font-family:"Space Grotesk"; font-size:13px; font-weight:600; color:var(--text); margin:22px 0 4px}
  .sobrante{padding:9px 0; border-bottom:1px solid var(--line); font-size:13px}

  .icon-btn{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;
    background:var(--panel);border:1px solid var(--line);border-radius:11px;color:var(--muted);cursor:pointer;transition:.18s}
  .icon-btn:hover{color:var(--text);border-color:var(--accent)}
  .icon-btn:focus-visible{outline:none;box-shadow:0 0 0 2px var(--accent-soft),0 0 0 1px var(--accent)}
  .icon-btn svg{width:18px;height:18px}
  .icon-btn .ico-moon{display:none}
  :root[data-theme="light"] .icon-btn .ico-sun{display:none}
  :root[data-theme="light"] .icon-btn .ico-moon{display:inline}

  :root[data-theme="light"]{
    --ink:#EDF1F8; --panel:#FFFFFF; --elev:#FFFFFF; --line:#E4EAF5;
    --text:#1B2436; --muted:#5A6A86; --faint:#9AA6BF;
    --shadow:0 1px 0 rgba(255,255,255,.7) inset, 0 14px 30px -22px rgba(31,45,74,.38);
  }
  :root[data-theme="light"] header{ background:linear-gradient(180deg,rgba(237,241,248,.92),rgba(237,241,248,.70)); }
  :root[data-theme="light"] .card{border-color:#E9EEF7}

  @media (max-width:560px){ .bar{padding:12px 14px} main{padding:14px} }
</style>
<script>document.documentElement.setAttribute("data-theme",(window.matchMedia&&matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark");</script>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand">
      <span class="dot"></span>
      <h1>Conciliar estado de cuenta</h1>
    </div>
    <a class="back" href="<?= url ?>">‹ Tablero</a>
    <button id="themeBtn" class="icon-btn" aria-label="Modo claro / oscuro" title="Modo claro / oscuro">
      <svg class="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg class="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
    </button>
  </div>
</header>

<main>
  <p class="nota">El PDF se abre en tu navegador: la clave no se envía a ningún lado.
  Al sistema solo viaja el texto extraído.</p>

  <div class="card">
    <label for="pdf">Estado de cuenta (PDF)</label>
    <input type="file" id="pdf" accept="application/pdf">
    <label for="clave">Clave del PDF</label>
    <input type="password" id="clave" autocomplete="off">
    <label for="banco">Banco</label>
    <select id="banco">
      <option value="auto" selected>Detectar automáticamente</option>
      <option value="BCP">BCP</option>
      <option value="BBVA">BBVA</option>
      <option value="Interbank">Interbank</option>
      <option value="Scotiabank">Scotiabank</option>
      <option value="Diners">Diners Club</option>
    </select>
    <button id="btn" class="btn-go" onclick="procesar()">Conciliar</button>
    <div id="estado"></div>
  </div>

  <div id="resultado">
    <div class="pct num"><span id="pctNum"></span><small id="pctDetalle"></small></div>
    <div class="metricas num" id="metricas"></div>
    <div id="bloqueSobrantes">
      <h2>Sin respaldo en el estado (revisar)</h2>
      <div id="sobrantes"></div>
    </div>
  </div>
</main>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const $ = id => document.getElementById(id);

  /* Tema: el dispositivo decide el arranque y el botón se registra UNA sola vez. */
  function applyTheme(mode){ document.documentElement.setAttribute("data-theme", mode); }
  applyTheme((window.matchMedia && matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark");
  $('themeBtn').addEventListener("click", ()=>{
    const next = document.documentElement.getAttribute("data-theme")==="light" ? "dark" : "light";
    applyTheme(next);
  });

  function estado(msg, esError) {
    $('estado').textContent = msg;
    $('estado').className = esError ? 'error' : '';
  }

  async function procesar() {
    const archivo = $('pdf').files[0];
    if (!archivo) { estado('Elige un PDF primero.', true); return; }
    $('btn').disabled = true;
    $('resultado').style.display = 'none';

    try {
      estado('Abriendo el PDF en tu navegador…');
      const data = new Uint8Array(await archivo.arrayBuffer());
      const doc = await pdfjsLib.getDocument({ data: data, password: $('clave').value }).promise;

      estado('Extrayendo texto (' + doc.numPages + ' páginas)…');
      let texto = '';
      for (let p = 1; p <= doc.numPages; p++) {
        const pagina = await doc.getPage(p);
        const contenido = await pagina.getTextContent();
        texto += contenido.items.map(i => i.str).join(' ') + '\n';
      }

      estado('Conciliando contra el libro mayor… (puede tomar ~1 min)');
      google.script.run
        .withSuccessHandler(pintar)
        .withFailureHandler(e => { estado(e.message, true); $('btn').disabled = false; })
        .conciliarTextoEstado(texto, archivo.name, $('banco').value);

    } catch (e) {
      const msg = (e && e.name === 'PasswordException')
        ? 'Clave incorrecta o requerida. Verifícala e intenta de nuevo.'
        : 'No se pudo leer el PDF: ' + (e.message || e);
      estado(msg, true);
      $('btn').disabled = false;
    }
  }

  function pintar(r) {
    estado('');
    $('btn').disabled = false;
    $('pctNum').textContent = r.pct + '%';
    $('pctDetalle').textContent = 'conciliado · ' + r.banco + ' · ' + r.etiqueta;
    // El banco se muestra siempre: si se detectó mal, todo lo insertado queda
    // con el rótulo equivocado y hay que verlo antes de confiar en el número.
    $('metricas').textContent = 'Banco: ' + r.banco +
      (r.bancoDetectado ? ' (detectado del PDF)' : ' (elegido a mano)') + ' · ' +
      r.transacciones + ' transacciones en el estado · ' +
      r.coinciden + ' coinciden · ' + r.insertadas + ' insertadas al registro';

    const cont = $('sobrantes');
    cont.innerHTML = '';
    if (r.sobrantes.length === 0) {
      $('bloqueSobrantes').style.display = 'none';
    } else {
      $('bloqueSobrantes').style.display = 'block';
      r.sobrantes.forEach(s => {
        const div = document.createElement('div');
        div.className = 'sobrante num';
        div.textContent = s;   // textContent: sin riesgo de inyección
        cont.appendChild(div);
      });
    }
    $('resultado').style.display = 'block';
  }
</script>
</body>
</html>
