<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<base target="_top">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
  /* colores de marca (iguales en claro y oscuro) */
  --pen:#2962ff;   /* PEN → azul TradingView */
  --usd:#ff9800;   /* USD → naranja */
  --ingreso:#089981; /* verde alza */
  --gasto:#f23645;   /* rojo baja */
  }
  html[data-theme="dark"]{
  --papel:#131722; --tarjeta:#1e222d; --linea:#2a2e39; --linea-2:#363a45;
  --tinta:#d1d4dc; --tenue:#787b86; --alerta:#f23645; --sombra:0 6px 20px rgba(0,0,0,.40);
  }
  html[data-theme="light"]{
  --papel:#f8f9fd; --tarjeta:#ffffff; --linea:#e0e3eb; --linea-2:#d1d4dc;
  --tinta:#131722; --tenue:#787b86; --alerta:#f23645; --sombra:0 4px 14px rgba(19,23,34,.06);
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--papel); color: var(--tinta);
    font: 15px/1.5 'IBM Plex Sans', system-ui, sans-serif;
    padding: 28px 18px 60px; max-width: 560px; margin: 0 auto;
  }
  .num { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }
  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
  h1 { font-size: 15px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
  header a { color: var(--tenue); text-decoration: none; font-size: 14px; }
  header a:hover { color: var(--tinta); }
  .nota { color: var(--tenue); font-size: 13.5px; margin-bottom: 22px; }

  .caja { background: var(--tarjeta); border: 1px solid var(--linea); border-radius: 8px; padding: 20px 22px; }
  label { display: block; font-size: 12px; letter-spacing: .08em; text-transform: uppercase;
          color: var(--tenue); margin: 14px 0 6px; }
  label:first-child { margin-top: 0; }
  input[type=file], input[type=password] {
    width: 100%; padding: 9px 10px; border: 1px solid var(--linea); border-radius: 5px;
    background: var(--papel); font: inherit; color: var(--tinta);
  }
  input:focus-visible { outline: 2px solid var(--pen); outline-offset: 1px; }
  button {
    margin-top: 18px; width: 100%; padding: 11px; border: 0; border-radius: 5px;
    background: var(--pen); color: #fff; font: 600 15px 'IBM Plex Sans', sans-serif; cursor: pointer;
  }
  button:hover { filter: brightness(1.08); }
  button:disabled { background: var(--tenue); cursor: default; }
  button:focus-visible { outline: 2px solid var(--tinta); outline-offset: 2px; }

  #estado { margin-top: 16px; color: var(--tenue); font-size: 14px; min-height: 20px; }
  #estado.error { color: var(--alerta); }

  #resultado { display: none; margin-top: 24px; }
  .pct { font-size: 34px; font-weight: 600; color: var(--pen); }
  .pct small { font-size: 14px; color: var(--tenue); font-weight: 400; margin-left: 8px; }
  .metricas { color: var(--tenue); font-size: 14px; margin-top: 4px; }
  h2 { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--tenue); margin: 22px 0 8px; }
  .sobrante { padding: 7px 2px; border-bottom: 1px solid var(--linea); font-size: 13.5px; }
</style>
</head>
<body>
  <header>
    <h1>Conciliar estado de cuenta</h1>
    <a href="<?= url ?>">‹ Tablero</a>
    <button class="tema" id="tema" aria-label="Cambiar tema" title="Cambiar tema">
      <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
      </svg>
      <svg class="i-moon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
    </button>
  </header>
  <p class="nota">El PDF se abre en tu navegador: la clave no se envía a ningún lado.
  Al sistema solo viaja el texto extraído.</p>

  <div class="caja">
    <label for="pdf">Estado de cuenta (PDF)</label>
    <input type="file" id="pdf" accept="application/pdf">
    <label for="clave">Clave del PDF</label>
    <input type="password" id="clave" autocomplete="off">
    <button id="btn" onclick="procesar()">Conciliar</button>
    <div id="estado"></div>
  </div>

  <div id="resultado">
    <div class="pct num"><span id="pctNum"></span><small id="pctDetalle"></small></div>
    <div class="metricas num" id="metricas"></div>
    <div id="bloqueSobrantes">
      <h2>Sin respaldo en el estado (revisar)</h2>
      <div id="sobrantes"></div>
    </div>
  </div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const $ = id => document.getElementById(id);

  function estado(msg, esError) {
    $('estado').textContent = msg;
    $('estado').className = esError ? 'error' : '';
  }

  $('tema').addEventListener('click', function () {
    var cur = document.documentElement.getAttribute('data-theme');
    document.documentElement.setAttribute('data-theme', cur === 'light' ? 'dark' : 'light');
  });
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
    document.documentElement.setAttribute('data-theme', 'light');
  }

  async function procesar() {
    const archivo = $('pdf').files[0];
    if (!archivo) { estado('Elige un PDF primero.', true); return; }
    $('btn').disabled = true;
    $('resultado').style.display = 'none';

    try {
      estado('Abriendo el PDF en tu navegador…');
      const data = new Uint8Array(await archivo.arrayBuffer());
      const doc = await pdfjsLib.getDocument({ data: data, password: $('clave').value }).promise;

      estado('Extrayendo texto (' + doc.numPages + ' páginas)…');
      let texto = '';
      for (let p = 1; p <= doc.numPages; p++) {
        const pagina = await doc.getPage(p);
        const contenido = await pagina.getTextContent();
        texto += contenido.items.map(i => i.str).join(' ') + '\n';
      }

      estado('Conciliando contra el libro mayor… (puede tomar ~1 min)');
      google.script.run
        .withSuccessHandler(pintar)
        .withFailureHandler(e => { estado(e.message, true); $('btn').disabled = false; })
        .conciliarTextoEstado(texto, archivo.name);

    } catch (e) {
      const msg = (e && e.name === 'PasswordException')
        ? 'Clave incorrecta o requerida. Verifícala e intenta de nuevo.'
        : 'No se pudo leer el PDF: ' + (e.message || e);
      estado(msg, true);
      $('btn').disabled = false;
    }
  }

  function pintar(r) {
    estado('');
    $('btn').disabled = false;
    $('pctNum').textContent = r.pct + '%';
    $('pctDetalle').textContent = 'conciliado · ' + r.etiqueta;
    $('metricas').textContent = r.transacciones + ' transacciones en el estado · ' +
      r.coinciden + ' coinciden · ' + r.insertadas + ' insertadas al registro';

    const cont = $('sobrantes');
    cont.innerHTML = '';
    if (r.sobrantes.length === 0) {
      $('bloqueSobrantes').style.display = 'none';
    } else {
      $('bloqueSobrantes').style.display = 'block';
      r.sobrantes.forEach(s => {
        const div = document.createElement('div');
        div.className = 'sobrante num';
        div.textContent = s;   // textContent: sin riesgo de inyección
        cont.appendChild(div);
      });
    }
    $('resultado').style.display = 'block';
  }
</script>
</body>
</html>
